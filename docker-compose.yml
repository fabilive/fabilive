version: '3.8'

services:
  mariadb:
    image: mariadb:10.6
    container_name: fabilive_db
    restart: always
    environment:
      MARIADB_DATABASE: fabilive
      MARIADB_USER: fabilive
      MARIADB_PASSWORD: fabilive
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fabilive_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: fabilive_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
      PMA_ABSOLUTE_URI: "http://localhost:8081/"
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
  redis_data:
