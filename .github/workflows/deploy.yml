name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, gd

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: |
          df -h
          npm install


      - name: Build Assets
        run: npm run build

      - name: Create Deployment Tarball
        run: |
          echo "--- Runner Space Before Cleanup ---"
          df -h
          echo "--- Removing Massive Archive Files from Runner ---"
          rm -rf *.zip *.rar *.7z
          echo "--- Runner Space After Cleanup ---"
          df -h
          echo "--- Runner Memory Status ---"
          free -m
          echo "--- Creating Resilient Tarball (Outside project root) ---"
          tar -czf ../fabilive_deploy.tar.gz --exclude=.git --exclude=node_modules --exclude=./vendor .
          mv ../fabilive_deploy.tar.gz .
          echo "--- Tarball Size ---"
          ls -lh fabilive_deploy.tar.gz

      - name: Pre-deployment Cleanup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          debug: true
          script: |
            echo "--- Backing Up User Uploads Before Deployment ---"
            BACKUP_DIR="/tmp/fabilive_uploads_backup"
            rm -rf $BACKUP_DIR
            mkdir -p $BACKUP_DIR

            # Back up all user-uploaded image/file directories
            for dir in products galleries thumbnails blogs users categories services attachments vendorselfie rideridfront rideridback; do
              if [ -d "/var/www/fabilive/public/assets/images/$dir" ]; then
                cp -a "/var/www/fabilive/public/assets/images/$dir" "$BACKUP_DIR/$dir"
                echo "  Backed up: images/$dir ($(find /var/www/fabilive/public/assets/images/$dir -type f | wc -l) files)"
              fi
            done

            # Back up digital product files
            if [ -d "/var/www/fabilive/public/assets/files" ]; then
              cp -a "/var/www/fabilive/public/assets/files" "$BACKUP_DIR/files"
              echo "  Backed up: assets/files"
            fi

            # Back up .env so it survives
            if [ -f "/var/www/fabilive/.env" ]; then
              cp -a "/var/www/fabilive/.env" "$BACKUP_DIR/.env"
              echo "  Backed up: .env"
            fi

            echo "--- Clearing Host Target Directory ---"
            rm -rf /var/www/fabilive/*
            df -h

      - name: Deploy to DigitalOcean (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          debug: true
          source: "fabilive_deploy.tar.gz"
          target: "/var/www/fabilive"

      - name: Run Post-deployment Tasks
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          debug: true
          script: |
            LOG_FILE="/var/www/fabilive/public/deploy_log.txt"
            
            echo "--- Unpacking Tarball ---"
            cd /var/www/fabilive
            tar -xzf fabilive_deploy.tar.gz
            rm fabilive_deploy.tar.gz
            
            # --- RESTORE BACKED-UP UPLOADS ---
            BACKUP_DIR="/tmp/fabilive_uploads_backup"
            echo "--- Restoring User Uploads After Deployment ---" >> $LOG_FILE
            
            # Restore image directories
            for dir in products galleries thumbnails blogs users categories services attachments vendorselfie rideridfront rideridback; do
              if [ -d "$BACKUP_DIR/$dir" ]; then
                mkdir -p "/var/www/fabilive/public/assets/images/$dir"
                cp -a "$BACKUP_DIR/$dir/." "/var/www/fabilive/public/assets/images/$dir/"
                echo "  Restored: images/$dir ($(find /var/www/fabilive/public/assets/images/$dir -type f | wc -l) files)" >> $LOG_FILE
              fi
            done
            
            # Restore digital product files
            if [ -d "$BACKUP_DIR/files" ]; then
              mkdir -p "/var/www/fabilive/public/assets/files"
              cp -a "$BACKUP_DIR/files/." "/var/www/fabilive/public/assets/files/"
              echo "  Restored: assets/files" >> $LOG_FILE
            fi
            
            # Restore .env
            if [ -f "$BACKUP_DIR/.env" ]; then
              cp -a "$BACKUP_DIR/.env" "/var/www/fabilive/.env"
              echo "  Restored: .env" >> $LOG_FILE
            fi
            
            # Cleanup backup
            rm -rf $BACKUP_DIR
            echo "--- Upload Restoration Complete ---" >> $LOG_FILE
            
            # Now we can write to the log file since 'public' exists
            echo "--- DEPLOYMENT DIAGNOSTICS V42 ---" > $LOG_FILE
            echo "Time: $(date)" >> $LOG_FILE
            
            echo "--- Droplet Resources ---" >> $LOG_FILE
            free -m >> $LOG_FILE
            
            echo "--- Environment Setup (.env) ---" >> $LOG_FILE
            # Only create .env if it doesn't exist
            if [ ! -f /var/www/fabilive/.env ]; then
              echo "Creating .env from .env.example" >> $LOG_FILE
              cp .env.example .env
            fi
            ls -la .env >> $LOG_FILE
            
            echo "--- Permissions Sync ---" >> $LOG_FILE
            sudo chown -R www-data:www-data /var/www/fabilive >> $LOG_FILE 2>&1
            sudo chmod -R 775 /var/www/fabilive/storage /var/www/fabilive/bootstrap/cache >> $LOG_FILE 2>&1
            # Explicitly fix logs permission
            sudo mkdir -p /var/www/fabilive/storage/logs >> $LOG_FILE 2>&1
            sudo touch /var/www/fabilive/storage/logs/laravel.log >> $LOG_FILE 2>&1
            sudo chmod -R 777 /var/www/fabilive/storage/logs >> $LOG_FILE 2>&1
            sudo chown -R www-data:www-data /var/www/fabilive/storage/logs >> $LOG_FILE 2>&1
            
            # CRITICAL: COMPOSER FIRST
            echo "--- Composer Install (CRITICAL) ---" >> $LOG_FILE
            # Use sudo if needed, but usually not recommended for composer. Trying without first but with hardening flags.
            composer install --no-dev --no-plugins --no-scripts --optimize-autoloader --ignore-platform-reqs >> $LOG_FILE 2>&1 || echo "Composer Install Failed" >> $LOG_FILE
            
            echo "--- Storage Init ---" >> $LOG_FILE
            sudo mkdir -p /var/www/fabilive/storage/framework/{sessions,views,cache} >> $LOG_FILE 2>&1
            sudo mkdir -p /var/www/fabilive/storage/app/public >> $LOG_FILE 2>&1
            sudo chmod -R 777 /var/www/fabilive/storage >> $LOG_FILE 2>&1
            php artisan storage:link >> $LOG_FILE 2>&1 || echo "Storage link already exists"
            
            echo "--- App Key Generation ---" >> $LOG_FILE
            if ! grep -q "APP_KEY=base64" .env; then
                php artisan key:generate --force >> $LOG_FILE 2>&1
            fi
            
            echo "--- Cache Clear & Migrations ---" >> $LOG_FILE
            php artisan optimize:clear >> $LOG_FILE 2>&1 || true
            php artisan migrate --force >> $LOG_FILE 2>&1 || echo "Migration Failed" >> $LOG_FILE
            
            echo "--- Final Health Check ---" >> $LOG_FILE
            grep "APP_KEY=" .env >> $LOG_FILE
            ls -la vendor/autoload.php >> $LOG_FILE 2>&1 || echo "CRITICAL: Autoloader missing!" >> $LOG_FILE
            
            echo "--- PHP Refresh ---" >> $LOG_FILE
            sudo systemctl restart php8.3-fpm >> $LOG_FILE 2>&1 || sudo service php8.3-fpm restart >> $LOG_FILE 2>&1
            
            echo "--- Log Output ---" >> $LOG_FILE
            tail -n 20 /var/www/fabilive/storage/logs/laravel.log >> $LOG_FILE 2>&1 || true
            
            echo "--- Diagnostic Log Ready at https://fabilive.com/deploy_log.txt ---" >> $LOG_FILE
            echo "--- Schema Dump Ready at https://fabilive.com/schemas.txt ---" >> $LOG_FILE
            
            chmod 644 $LOG_FILE
            chmod 644 public/schemas.txt
            cat $LOG_FILE
