name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, gd

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: |
          df -h
          npm install


      - name: Build Assets
        run: npm run build

      - name: Create Deployment Tarball
        run: |
          echo "--- Runner Space Before Cleanup ---"
          df -h
          echo "--- Removing Massive Archive Files from Runner ---"
          rm -rf *.zip *.rar *.7z
          echo "--- Runner Space After Cleanup ---"
          df -h
          echo "--- Runner Memory Status ---"
          free -m
          echo "--- Creating Resilient Tarball (Outside project root) ---"
          tar -czf ../fabilive_deploy.tar.gz --exclude=.git --exclude=node_modules --exclude=./vendor .
          mv ../fabilive_deploy.tar.gz .
          echo "--- Tarball Size ---"
          ls -lh fabilive_deploy.tar.gz

      - name: Pre-deployment Cleanup & Migration
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          debug: true
          script: |
            echo "--- Preparing Shared Persistent Storage ---"
            SHARED_DIR="/var/www/fabilive_shared"
            mkdir -p $SHARED_DIR/assets/images
            mkdir -p $SHARED_DIR/assets/files
            mkdir -p $SHARED_DIR/storage/app/public

            # --- ONE-TIME MIGRATION ---
            # Migration logic: if a standard directory is found where a symlink should be, move it to shared.
            # Images
            if [ -d "/var/www/fabilive/public/assets/images" ] && [ ! -L "/var/www/fabilive/public/assets/images" ]; then
              echo "  Migrating legacy assets/images to shared storage..."
              cp -an /var/www/fabilive/public/assets/images/. $SHARED_DIR/assets/images/
            fi
            # Files
            if [ -d "/var/www/fabilive/public/assets/files" ] && [ ! -L "/var/www/fabilive/public/assets/files" ]; then
              echo "  Migrating legacy assets/files to shared storage..."
              cp -an /var/www/fabilive/public/assets/files/. $SHARED_DIR/assets/files/
            fi
            # .env preservation
            if [ -f "/var/www/fabilive/.env" ]; then
              cp -an /var/www/fabilive/.env $SHARED_DIR/.env
              echo "  Preserved .env in shared storage"
            fi

            echo "--- Clearing Host Target Directory (Protected) ---"
            # We clear the app directory, but the shared storage is outside and safe.
            rm -rf /var/www/fabilive/*
            df -h

      - name: Deploy to DigitalOcean (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          debug: true
          source: "fabilive_deploy.tar.gz"
          target: "/var/www/fabilive"

      - name: Run Post-deployment Tasks (Persistence)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          debug: true
          script: |
            # Ensure public directory exists
            mkdir -p /var/www/fabilive/public
            LOG_FILE="/var/www/fabilive/public/deploy_log.txt"
            SHARED_DIR="/var/www/fabilive_shared"
            
            echo "--- Unpacking Tarball ---"
            cd /var/www/fabilive
            if [ -f "fabilive_deploy.tar.gz" ]; then
                tar -xzf fabilive_deploy.tar.gz
                rm fabilive_deploy.tar.gz
            else
                echo "ERROR: fabilive_deploy.tar.gz NOT FOUND!" >&2
            fi
            
            # --- ESTABLISH PERSISTENT SYMLINKS ---
            echo "--- Linking Persistent Shared Assets ---" >> $LOG_FILE 2>&1
            
            # .env linkage
            if [ -f "$SHARED_DIR/.env" ]; then
              ln -sf "$SHARED_DIR/.env" "/var/www/fabilive/.env"
              echo "  Linked: .env" >> $LOG_FILE
            fi

            # Assets linkage
            # Sync new images from deployment into shared storage BEFORE linking
            # This ensures images pushed via git actually reach the live server
            echo "--- Syncing New Images to Shared Storage ---"
            if [ -d "/var/www/fabilive/public/assets/images" ] && [ ! -L "/var/www/fabilive/public/assets/images" ]; then
              echo "  Syncing slider images to shared storage..."
              mkdir -p "$SHARED_DIR/assets/images/sliders"
              cp -f /var/www/fabilive/public/assets/images/sliders/*.png "$SHARED_DIR/assets/images/sliders/" 2>/dev/null || true
              cp -f /var/www/fabilive/public/assets/images/sliders/*.jpg "$SHARED_DIR/assets/images/sliders/" 2>/dev/null || true
              cp -f /var/www/fabilive/public/assets/images/sliders/*.jfif "$SHARED_DIR/assets/images/sliders/" 2>/dev/null || true
              cp -f /var/www/fabilive/public/assets/images/sliders/*.jpeg "$SHARED_DIR/assets/images/sliders/" 2>/dev/null || true
              cp -f /var/www/fabilive/public/assets/images/*.png "$SHARED_DIR/assets/images/" 2>/dev/null || true
              cp -f /var/www/fabilive/public/assets/images/*.jpg "$SHARED_DIR/assets/images/" 2>/dev/null || true
              echo "  Sync complete."
            fi

            # First remove placeholder empty directories from the deployment
            rm -rf /var/www/fabilive/public/assets/images
            rm -rf /var/www/fabilive/public/assets/files
            mkdir -p /var/www/fabilive/public/assets

            ln -sfn "$SHARED_DIR/assets/images" "/var/www/fabilive/public/assets/images"
            ln -sfn "$SHARED_DIR/assets/files" "/var/www/fabilive/public/assets/files"
            
            # Ensure Blogs folder exists within shared storage and is writable
            mkdir -p "$SHARED_DIR/assets/images/blogs"
            sudo chown -R www-data:www-data "$SHARED_DIR/assets/images"
            sudo chmod -R 775 "$SHARED_DIR/assets/images"
            
            echo "  Linked: Shared assets with hardened permissions" >> $LOG_FILE
            
            echo "--- Persistence Setup Complete ---" >> $LOG_FILE
            
            echo "--- DEPLOYMENT DIAGNOSTICS V43 ---" >> $LOG_FILE
            echo "Time: $(date)" >> $LOG_FILE
            
            echo "--- Droplet Resources ---" >> $LOG_FILE
            free -m >> $LOG_FILE
            
            echo "--- Environment Setup (.env) ---" >> $LOG_FILE
            # Only create .env if it doesn't exist
            if [ ! -f /var/www/fabilive/.env ]; then
              echo "Creating .env from .env.example" >> $LOG_FILE
              cp .env.example .env
            fi
            ls -la .env >> $LOG_FILE
            
            echo "--- Permissions Sync ---" >> $LOG_FILE
            sudo chown -R www-data:www-data /var/www/fabilive >> $LOG_FILE 2>&1
            sudo chmod -R 775 /var/www/fabilive/storage /var/www/fabilive/bootstrap/cache >> $LOG_FILE 2>&1
            # Explicitly fix logs permission
            sudo mkdir -p /var/www/fabilive/storage/logs >> $LOG_FILE 2>&1
            sudo touch /var/www/fabilive/storage/logs/laravel.log >> $LOG_FILE 2>&1
            sudo chmod -R 777 /var/www/fabilive/storage/logs >> $LOG_FILE 2>&1
            sudo chown -R www-data:www-data /var/www/fabilive/storage/logs >> $LOG_FILE 2>&1
            
            # CRITICAL: COMPOSER FIRST
            echo "--- Composer Install (CRITICAL) ---" >> $LOG_FILE
            # Use sudo if needed, but usually not recommended for composer. Trying without first but with hardening flags.
            composer install --no-dev --no-plugins --no-scripts --optimize-autoloader --ignore-platform-reqs >> $LOG_FILE 2>&1 || echo "Composer Install Failed" >> $LOG_FILE
            
            echo "--- Storage Init ---" >> $LOG_FILE
            sudo mkdir -p /var/www/fabilive/storage/framework/{sessions,views,cache} >> $LOG_FILE 2>&1
            sudo mkdir -p /var/www/fabilive/storage/app/public >> $LOG_FILE 2>&1
            sudo chmod -R 777 /var/www/fabilive/storage >> $LOG_FILE 2>&1
            php artisan storage:link >> $LOG_FILE 2>&1 || echo "Storage link already exists"
            
            echo "--- App Key Generation ---" >> $LOG_FILE
            if ! grep -q "APP_KEY=base64" .env; then
                php artisan key:generate --force >> $LOG_FILE 2>&1
            fi
            
            echo "--- Cache Clear & Migrations ---" >> $LOG_FILE
            php artisan optimize:clear >> $LOG_FILE 2>&1 || true
            php artisan migrate --force >> $LOG_FILE 2>&1 || echo "Migration Failed" >> $LOG_FILE
            
            echo "--- Final Health Check ---" >> $LOG_FILE
            grep "APP_KEY=" .env >> $LOG_FILE
            ls -la vendor/autoload.php >> $LOG_FILE 2>&1 || echo "CRITICAL: Autoloader missing!" >> $LOG_FILE
            
            echo "--- PHP Refresh ---" >> $LOG_FILE
            sudo systemctl restart php8.3-fpm >> $LOG_FILE 2>&1 || sudo service php8.3-fpm restart >> $LOG_FILE 2>&1
            
            echo "--- Log Output ---" >> $LOG_FILE
            tail -n 20 /var/www/fabilive/storage/logs/laravel.log >> $LOG_FILE 2>&1 || true
            
            echo "--- Diagnostic Log Ready at https://fabilive.com/deploy_log.txt ---" >> $LOG_FILE
            echo "--- Schema Dump Ready at https://fabilive.com/schemas.txt ---" >> $LOG_FILE
            
            chmod 644 $LOG_FILE
            chmod 644 public/schemas.txt
            cat $LOG_FILE

      - name: Force Sync Images to Shared Storage
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            SHARED_DIR="/var/www/fabilive_shared"
            echo "--- Force Syncing All Slider Images to Shared Storage ---"
            mkdir -p "$SHARED_DIR/assets/images/sliders"
            
            # Copy images directly from the deployed code through the symlink-aware path
            # The symlink points shared storage back to itself, so we use a temp path trick
            # We read the files from the git repo cached on the runner - instead, find
            # the actual files via the real path to shared storage
            
            # List what's currently in shared sliders
            echo "Current shared slider images:"
            ls -lh "$SHARED_DIR/assets/images/sliders/"
            
            # The deployed app's public/assets/images is a symlink to SHARED_DIR/assets/images
            # So the source of truth is the git repo. We need to read files from a temp location.
            # Strategy: the tarball was already unpacked before symlinking.
            # At this point the symlink exists. We can't read "new" files through it.
            # Instead, re-download just the slider images from GitHub directly.
            
            REPO="fabilive/fabilive"
            BRANCH="main"
            SLIDER_DIR="$SHARED_DIR/assets/images/sliders"
            
            # Download the specific new images directly from GitHub raw
            echo "Downloading african_fashion_v3.png from GitHub..."
            curl -L -o "$SLIDER_DIR/african_fashion_v3.png" \
              "https://raw.githubusercontent.com/$REPO/$BRANCH/public/assets/images/sliders/african_fashion_v3.png" \
              && echo "  Download OK" || echo "  Download FAILED"
            
            echo "Downloading fashion_hero.png from GitHub..."
            curl -L -o "$SLIDER_DIR/fashion_hero.png" \
              "https://raw.githubusercontent.com/$REPO/$BRANCH/public/assets/images/sliders/fashion_hero.png" \
              && echo "  Download OK" || echo "  Download FAILED"
            
            echo "Downloading deal-of-the-day.png from GitHub..."
            curl -L -o "$SHARED_DIR/assets/images/deal-of-the-day.png" \
              "https://raw.githubusercontent.com/$REPO/$BRANCH/public/assets/images/deal-of-the-day.png" \
              && echo "  Download OK" || echo "  Download FAILED"

            # Sync New Category Images
            CAT_DIR="$SHARED_DIR/assets/images/categories"
            mkdir -p "$CAT_DIR"
            NEW_CATS=(
              "building.png"
              "market.png"
              "baby.png"
              "health.png"
              "gaming.png"
              "solar.png"
              "beauty.png"
              "auto.png"
              "internet.png"
            )

            for img in "${NEW_CATS[@]}"; do
              echo "Downloading category image $img..."
              curl -L -o "$CAT_DIR/$img" \
                "https://raw.githubusercontent.com/$REPO/$BRANCH/public/assets/images/categories/$img" \
                && echo "  Download OK" || echo "  Download FAILED"
            done

            # Fix permissions
            sudo chown -R www-data:www-data "$SHARED_DIR/assets/images"
            sudo chmod -R 775 "$SHARED_DIR/assets/images"
            
            echo "--- Final Slider Images in Shared Storage ---"
            ls -lh "$SHARED_DIR/assets/images/sliders/"
            echo "--- Image Sync Complete ---"
