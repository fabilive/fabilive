name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, bcmath, gd

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Assets
        run: npm run build

      - name: Pre-deployment Cleanup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            echo "--- Reclaiming Space Before Transfer ---"
            docker system prune -af --volumes || true
            echo "--- Clearing Host Target Directory ---"
            rm -rf /var/www/fabilive/*
            echo "--- Host Space Check ---"
            df -h
            docker system df

      - name: Deploy to DigitalOcean (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          source: "., !node_modules, !vendor, !.git"
          target: "/var/www/fabilive"

      - name: Run Post-deployment Tasks
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            echo "--- Checking Host Space ---"
            df -h
            
            echo "--- Syncing code from Host to Container Volume ---"
            docker cp /var/www/fabilive/. fabilive_app:/var/www/fabilive/ || true
            
            echo "--- Initializing Storage Subdirectories in Shared Volume ---"
            docker exec fabilive_app mkdir -p /var/www/fabilive/storage/framework/sessions
            docker exec fabilive_app mkdir -p /var/www/fabilive/storage/framework/views
            docker exec fabilive_app mkdir -p /var/www/fabilive/storage/framework/cache
            docker exec fabilive_app mkdir -p /var/www/fabilive/storage/app/public
            docker exec fabilive_app chmod -R 777 /var/www/fabilive/storage /var/www/fabilive/bootstrap/cache || true
            
            echo "--- In-Container Composer Install (Shared Volume) ---"
            docker exec -w /var/www/fabilive fabilive_app composer install --no-dev --optimize-autoloader || true
            
            echo "--- Health Checks & Migrations (Shared Volume) ---"
            docker exec -w /var/www/fabilive fabilive_app php artisan optimize:clear || true
            docker exec -w /var/www/fabilive fabilive_app php artisan migrate --force || true
            
            echo "--- Host Diagnostic: Checking Autoloader ---"
            ls -la /var/www/fabilive/vendor/autoload.php || echo "CRITICAL: Autoloader missing on host!"
            
            echo "--- Final Laravel Log Check ---"
            docker exec -w /var/www/fabilive fabilive_app tail -n 50 storage/logs/laravel.log || true
            
            echo "--- Final Space Check ---"
            df -h
            docker exec fabilive_app df -h || true
            echo "------------------------"
