name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, bcmath, gd

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Assets
        run: npm run build

      - name: Pre-deployment Cleanup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            echo "--- Reclaiming Space Before Transfer ---"
            docker system prune -af --volumes || true
            echo "--- Clearing Host Target Directory ---"
            rm -rf /var/www/fabilive/*
            echo "--- Host Space Check ---"
            df -h
            docker system df

      - name: Deploy to DigitalOcean (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          source: "., !node_modules, !vendor, !.git"
          target: "/var/www/fabilive"

      - name: Run Post-deployment Tasks
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            echo "--- Checking Container Internal Space ---"
            docker exec fabilive_app df -h || true
            
            echo "--- Syncing code from Host to Container ---"
            # We copy to /var/www/fabilive (the bind mount)
            docker cp /var/www/fabilive/. fabilive_app:/var/www/fabilive/ || true
            
            echo "--- Synchronizing Web Root (/var/www/html) ---"
            # Ensure the target exists and is clean
            docker exec fabilive_app mkdir -p /var/www/html
            docker exec fabilive_app sh -c "rm -rf /var/www/html/*" || true
            docker exec fabilive_app cp -r /var/www/fabilive/. /var/www/html/ || true
            
            echo "--- Container: Verifying synced files in /var/www/html ---"
            docker exec fabilive_app ls -la /var/www/html/public/index.php || true
            
            echo "--- In-Container Composer Install ---"
            docker exec -w /var/www/html fabilive_app composer install --no-dev --optimize-autoloader || true
            
            echo "--- Latest Laravel Logs ---"
            docker exec -w /var/www/html fabilive_app tail -n 100 storage/logs/laravel.log || true
            
            echo "--- Container Details & Nginx Check ---"
            docker exec fabilive_app nginx -T | grep "root" || true
            
            echo "--- Database Connectivity Test ---"
            docker exec -w /var/www/html fabilive_app php artisan tinker --execute="try { DB::connection()->getPdo(); echo 'DB Connected Successfully!'; } catch (\Exception \$e) { echo 'DB Connection Failed: ' . \$e->getMessage(); }" || true
            
            echo "------------------------"
            echo "--- Fixing Permissions inside container ---"
            docker exec fabilive_app chown -R www-data:www-data /var/www/html || true
            docker exec -w /var/www/html fabilive_app chmod -R 775 storage bootstrap/cache || true
            
            echo "--- Running Migration inside container ---"
            docker exec -w /var/www/html fabilive_app php artisan migrate --force || true
            
            echo "--- Clearing Cache ---"
            docker exec -w /var/www/html fabilive_app php artisan optimize:clear || true
            
            echo "--- Final Space Check ---"
            df -h
            docker exec fabilive_app df -h || true
            echo "------------------------"


