name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, bcmath, gd

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Assets
        run: npm run build

      - name: Deploy to DigitalOcean
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          source: "., !node_modules, !vendor/composer/autoload_static.php"
          target: "/var/www/fabilive"

      - name: Run Artisan Commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            echo "--- Host Diagnostics ---"
            df -h
            docker system df
            
            echo "--- Cleaning up Host to avoid Ghost Files ---"
            rm -rf /var/www/fabilive/node_modules
            
            echo "--- Syncing code from Host to Container ---"
            docker cp /var/www/fabilive/. fabilive_app:/var/www/fabilive/ || true
            
            echo "--- Networking Diagnostics ---"
            docker exec fabilive_app ip route || true
            docker exec fabilive_app cat /etc/hosts || true
            
            echo "--- Environment File ---"
            docker exec fabilive_app cat .env | grep -E "DB_|REDIS_|APP_URL" || true
            
            echo "--- Database Connectivity Test ---"
            docker exec fabilive_app php artisan tinker --execute="try { DB::connection()->getPdo(); echo 'DB Connected Successfully!'; } catch (\Exception \$e) { echo 'DB Connection Failed: ' . \$e->getMessage(); }" || true
            
            echo "--- Latest Laravel Logs ---"
            docker exec fabilive_app tail -n 50 storage/logs/laravel.log || true
            
            echo "------------------------"
            echo "--- Fixing Permissions inside container ---"
            docker exec fabilive_app chown -R www-data:www-data /var/www/fabilive || true
            docker exec fabilive_app chmod -R 775 /var/www/fabilive/storage /var/www/fabilive/bootstrap/cache || true
            
            echo "--- Auditing Controller Directory ---"
            docker exec fabilive_app ls -la /var/www/fabilive/app/Http/Controllers/User/ || true
            
            echo "--- Running Migration inside container ---"
            docker exec fabilive_app php artisan migrate --force || true
            
            echo "--- Regenerating Autoloader and Clearing Cache ---"
            docker exec fabilive_app composer dump-autoload --optimize || true
            docker exec fabilive_app php artisan optimize:clear || true
            
            echo "--- Pruning Old Docker Resources ---"
            docker image prune -f || true
            
            echo "--- Cleanup script from container ---"
            docker exec fabilive_app rm -f force_admin_reset.php || true
            echo "------------------------"

