name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, gd

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: |
          df -h
          npm install


      - name: Build Assets
        run: npm run build

      - name: Create Deployment Tarball
        run: |
          echo "--- Runner Space Before Cleanup ---"
          df -h
          echo "--- Removing Massive Archive Files from Runner ---"
          rm -rf *.zip *.rar *.7z
          echo "--- Runner Space After Cleanup ---"
          df -h
          echo "--- Runner Memory Status ---"
          free -m
          echo "--- Creating Resilient Tarball (Outside project root) ---"
          tar -czf ../fabilive_deploy.tar.gz --exclude=.git --exclude=node_modules --exclude=./vendor .
          mv ../fabilive_deploy.tar.gz .
          echo "--- Tarball Size ---"
          ls -lh fabilive_deploy.tar.gz

      - name: Pre-deployment Cleanup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          debug: true
          script: |
            echo "--- Reclaiming Space Before Transfer ---"
            docker system prune -af --volumes || true
            echo "--- Droplet Memory Before Deployment ---"
            free -m
            echo "--- Clearing Host Target Directory ---"
            rm -rf /var/www/fabilive/*
            df -h

      - name: Deploy to DigitalOcean (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          debug: true
          source: "fabilive_deploy.tar.gz"
          target: "/var/www/fabilive"

      - name: Run Post-deployment Tasks
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          debug: true
          script: |
            LOG_FILE="/var/www/fabilive/public/deploy_log.txt"
            
            echo "--- Unpacking Tarball ---"
            cd /var/www/fabilive
            tar -xzf fabilive_deploy.tar.gz
            rm fabilive_deploy.tar.gz
            
            # Now we can write to the log file since 'public' exists
            echo "--- DEPLOYMENT DIAGNOSTICS V25 ---" > $LOG_FILE
            echo "Time: $(date)" >> $LOG_FILE
            
            echo "--- Droplet Resources ---" >> $LOG_FILE
            free -m >> $LOG_FILE
            
            echo "--- Environment Setup (.env) ---" >> $LOG_FILE
            # Only create .env if it doesn't exist
            if [ ! -f /var/www/fabilive/.env ]; then
              echo "Creating .env from .env.example" >> $LOG_FILE
              cp /var/www/fabilive/.env.example /var/www/fabilive/.env
            fi
            
            echo "--- Permissions Sync ---" >> $LOG_FILE
            chown -R www-data:www-data /var/www/fabilive >> $LOG_FILE 2>&1
            chmod -R 775 /var/www/fabilive/storage /var/www/fabilive/bootstrap/cache >> $LOG_FILE 2>&1
            # Explicitly fix logs permission
            mkdir -p /var/www/fabilive/storage/logs >> $LOG_FILE 2>&1
            touch /var/www/fabilive/storage/logs/laravel.log >> $LOG_FILE 2>&1
            chmod -R 777 /var/www/fabilive/storage/logs >> $LOG_FILE 2>&1
            chown -R www-data:www-data /var/www/fabilive/storage/logs >> $LOG_FILE 2>&1
            
            echo "--- Storage Init ---" >> $LOG_FILE
            mkdir -p /var/www/fabilive/storage/framework/{sessions,views,cache} >> $LOG_FILE 2>&1
            mkdir -p /var/www/fabilive/storage/app/public >> $LOG_FILE 2>&1
            chmod -R 777 /var/www/fabilive/storage >> $LOG_FILE 2>&1
            
            echo "--- Composer Install (CRITICAL) ---" >> $LOG_FILE
            composer install --no-dev --optimize-autoloader --ignore-platform-reqs --working-dir=/var/www/fabilive >> $LOG_FILE 2>&1 || echo "Composer Install Failed" >> $LOG_FILE
            
            echo "--- App Key Generation ---" >> $LOG_FILE
            grep -q "APP_KEY=base64:" /var/www/fabilive/.env || php /var/www/fabilive/artisan key:generate --force >> $LOG_FILE 2>&1
            
            echo "--- Cache Clear & Migrations ---" >> $LOG_FILE
            php /var/www/fabilive/artisan optimize:clear >> $LOG_FILE 2>&1 || true
            php /var/www/fabilive/artisan migrate --force >> $LOG_FILE 2>&1 || echo "Migration Failed" >> $LOG_FILE
            
            echo "--- Final Health Check ---" >> $LOG_FILE
            grep "APP_KEY=" /var/www/fabilive/.env >> $LOG_FILE
            ls -la /var/www/fabilive/vendor/autoload.php >> $LOG_FILE 2>&1 || echo "CRITICAL: Autoloader missing!" >> $LOG_FILE
            
            echo "--- Log Output ---" >> $LOG_FILE
            tail -n 20 /var/www/fabilive/storage/logs/laravel.log >> $LOG_FILE 2>&1 || true
            
            echo "--- Diagnostic Log Ready at https://fabilive.com/deploy_log.txt ---" >> $LOG_FILE
            cat $LOG_FILE
