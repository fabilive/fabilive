name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, bcmath, gd

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Assets
        run: npm run build

      - name: Pre-deployment Cleanup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            echo "--- Reclaiming Space Before Transfer ---"
            docker system prune -af --volumes || true
            echo "--- Clearing Host Target Directory ---"
            rm -rf /var/www/fabilive/*
            echo "--- Host Space Check ---"
            df -h
            docker system df

      - name: Deploy to DigitalOcean (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          source: "., !node_modules, !vendor, !.git"
          target: "/var/www/fabilive"

      - name: Run Post-deployment Tasks
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            LOG_FILE="/var/www/fabilive/public/deploy_log.txt"
            echo "--- DEPLOYMENT DIAGNOSTICS V13 ---" > $LOG_FILE
            echo "Time: $(date)" >> $LOG_FILE
            
            echo "--- Environment Setup (.env) ---" >> $LOG_FILE
            if [ ! -f /var/www/fabilive/.env ]; then
              echo "Creating .env from .env.example" >> $LOG_FILE
              cp /var/www/fabilive/.env.example /var/www/fabilive/.env
              sed -i 's/DB_HOST=.*/DB_HOST=mariadb/' /var/www/fabilive/.env
              sed -i 's/DB_DATABASE=.*/DB_DATABASE=fabilive/' /var/www/fabilive/.env
              sed -i 's/DB_USERNAME=.*/DB_USERNAME=fabilive/' /var/www/fabilive/.env
              sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=fabilive/' /var/www/fabilive/.env
              docker exec -w /var/www/fabilive fabilive_app php artisan key:generate --force >> $LOG_FILE 2>&1
            else
              echo ".env already exists" >> $LOG_FILE
            fi
            
            echo "--- Syncing code from Host to Container Volume ---" >> $LOG_FILE
            docker exec fabilive_app chown -R www-data:www-data /var/www/fabilive >> $LOG_FILE 2>&1 || true
            
            echo "--- Initializing Storage Subdirectories in Shared Volume ---" >> $LOG_FILE
            mkdir -p /var/www/fabilive/storage/framework/{sessions,views,cache} >> $LOG_FILE 2>&1
            mkdir -p /var/www/fabilive/storage/app/public >> $LOG_FILE 2>&1
            chmod -R 777 /var/www/fabilive/storage /var/www/fabilive/bootstrap/cache >> $LOG_FILE 2>&1
            
            echo "--- In-Container Composer Install (Shared Volume) ---" >> $LOG_FILE
            docker exec -w /var/www/fabilive fabilive_app composer install --no-dev --optimize-autoloader >> $LOG_FILE 2>&1 || echo "Composer Install Failed" >> $LOG_FILE
            
            echo "--- Active Database Configuration ---" >> $LOG_FILE
            docker exec -w /var/www/fabilive fabilive_app php artisan tinker --execute="print_r(config('database.connections.mysql'))" >> $LOG_FILE 2>&1 || true
            
            echo "--- Health Checks & Migrations (Shared Volume) ---" >> $LOG_FILE
            docker exec -w /var/www/fabilive fabilive_app php artisan optimize:clear >> $LOG_FILE 2>&1 || true
            docker exec -w /var/www/fabilive fabilive_app php artisan migrate --force >> $LOG_FILE 2>&1 || echo "Migration Failed" >> $LOG_FILE
            
            echo "--- Host Diagnostic: Checking Autoloader ---" >> $LOG_FILE
            ls -la /var/www/fabilive/vendor/autoload.php >> $LOG_FILE 2>&1 || echo "CRITICAL: Autoloader missing on host!" >> $LOG_FILE
            
            echo "--- Final Laravel Log Check ---" >> $LOG_FILE
            docker exec -w /var/www/fabilive fabilive_app tail -n 50 storage/logs/laravel.log >> $LOG_FILE 2>&1 || true
            
            echo "--- Diagnostic Log Ready at http://165.227.114.119/deploy_log.txt ---" >> $LOG_FILE
            cat $LOG_FILE
