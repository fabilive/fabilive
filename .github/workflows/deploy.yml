name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, bcmath, gd

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Assets
        run: npm run build

      - name: Deploy to DigitalOcean
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          source: "."
          target: "/var/www/fabilive"

      - name: Run Artisan Commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            echo "--- Container Path Debug ---"
            docker exec fabilive_app pwd || true
            docker exec fabilive_app ls -la /var/www/fabilive/force_admin_reset.php || true
            docker exec fabilive_app ls -la force_admin_reset.php || true
            echo "--- Grepping Route in container ---"
            docker exec fabilive_app grep -r "admin-prod-feature" routes/ || true
            echo "--- Running Emergency Reset (full path) ---"
            docker exec fabilive_app php /var/www/fabilive/force_admin_reset.php || true
            echo "--- Cleanup ---"
            rm /var/www/fabilive/force_admin_reset.php || true
            echo "--- Laravel Status ---"
            docker exec fabilive_app php artisan migrate --force || true
            docker exec fabilive_app php artisan optimize:clear || true
            echo "------------------------"
