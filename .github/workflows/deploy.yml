name: Deploy to DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, bcmath, gd

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Assets
        run: npm run build

      - name: Pre-deployment Cleanup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            echo "--- Reclaiming Space Before Transfer ---"
            docker system prune -af --volumes || true
            echo "--- Clearing Host Target Directory ---"
            rm -rf /var/www/fabilive/*
            echo "--- Host Space Check ---"
            df -h
            docker system df

      - name: Deploy to DigitalOcean (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          source: "., !node_modules, !vendor, !.git"
          target: "/var/www/fabilive"

      - name: Run Post-deployment Tasks
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            echo "--- Checking Host Space ---"
            df -h
            
            echo "--- Syncing code from Host to Container ---"
            # We copy to /var/www/fabilive (the bind mount)
            docker cp /var/www/fabilive/. fabilive_app:/var/www/fabilive/ || true
            
            echo "--- Synchronizing Web Roots (/var/www/html & /var/www/fabilive) ---"
            # Ensure the standard web root exists and is clean
            docker exec fabilive_app mkdir -p /var/www/html
            docker exec fabilive_app sh -c "rm -rf /var/www/html/*" || true
            docker exec fabilive_app cp -r /var/www/fabilive/. /var/www/html/ || true
            
            echo "--- Initializing Storage Subdirectories ---"
            docker exec fabilive_app mkdir -p /var/www/html/storage/framework/sessions
            docker exec fabilive_app mkdir -p /var/www/html/storage/framework/views
            docker exec fabilive_app mkdir -p /var/www/html/storage/framework/cache
            docker exec fabilive_app mkdir -p /var/www/html/storage/app/public
            
            echo "--- Fixing Permissions ---"
            docker exec fabilive_app chown -R www-data:www-data /var/www/html
            docker exec fabilive_app chmod -R 777 /var/www/html/storage /var/www/html/bootstrap/cache
            
            echo "--- Container: Verifying synced files in /var/www/html ---"
            docker exec fabilive_app ls -la /var/www/html/public/index.php || true
            
            echo "--- In-Container Composer Install ---"
            docker exec -w /var/www/html fabilive_app composer install --no-dev --optimize-autoloader || true
            
            echo "--- Diagnostics & Health Checks ---"
            docker exec -w /var/www/html fabilive_app php artisan optimize:clear || true
            docker exec -w /var/www/html fabilive_app php artisan migrate --force || true
            
            echo "--- Final Laravel Log Check ---"
            docker exec -w /var/www/html fabilive_app tail -n 50 storage/logs/laravel.log || true
            
            echo "--- Nginx Version & Config Check ---"
            docker exec fabilive_app nginx -v || true
            docker exec fabilive_app nginx -T | grep -E "root|index" || true
            
            echo "------------------------"
            df -h
            docker exec fabilive_app df -h || true
            echo "------------------------"


